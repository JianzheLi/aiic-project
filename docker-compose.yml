services:
  backend:
    build:
      context: ./backend
    container_name: aiic-agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
      MODEL_NAME: ${MODEL_NAME:-deepseek-v4-flash}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-你是一个中文友好的 AI Agent 产品挑战助手，回答要清晰、务实、可执行。}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_VERSION: ${VITE_APP_VERSION:-${APP_VERSION:-dev}}
        VITE_BUILD_TIME: ${VITE_BUILD_TIME:-${APP_BUILD_TIME:-local}}
    container_name: aiic-agent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
